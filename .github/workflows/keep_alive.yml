name: Keep backend awake

# Render's free tier spins the service down after ~15 minutes of inactivity,
# which gives visitors a slow (~50s) first load. This pings the health endpoint
# on a schedule so the instance stays warm during the day.
#
# Note: GitHub may delay or skip scheduled runs under load, and disables
# scheduled workflows after 60 days without repo activity. This is a
# best-effort warmer, not a guarantee.

on:
  schedule:
    - cron: "*/13 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /health
        run: |
          echo "Pinging backend health endpoint..."
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 \
            https://edmontonlens-api.onrender.com/health || echo "000")
          echo "HTTP status: $code"
          if [ "$code" != "200" ]; then
            echo "Health check did not return 200 (got $code). The service may be waking up."
          fi
