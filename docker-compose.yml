services:
  db:
    image: postgres:16-alpine
    container_name: edmontonlens-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: edmonton_lens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edmonton_lens"]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.3
    container_name: edmontonlens-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: edmonton_lens
      MYSQL_USER: edmonton
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/scripts/data_modelling/schema_mysql.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: edmontonlens-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "EdmontonLens123!"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "EdmontonLens123!" -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: edmontonlens-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/edmonton_lens
      MYSQL_DATABASE_URL: mysql+pymysql://edmonton:password@mysql:3306/edmonton_lens
      SQLSERVER_DATABASE_URL: "mssql+pyodbc://sa:EdmontonLens123!@sqlserver:1433/edmonton_lens?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - ./models:/app/models
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: edmontonlens-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  mysql_data:
  sqlserver_data:
